# nginx proxy address - http://172.17.0.1:59042

name: ollama
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  ui:
    image: 'ghcr.io/open-webui/open-webui:main'
    container_name: ollama-ui
    hostname: ollama-ui
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      ANONYMIZED_TELEMETRY: "false"
      OLLAMA_BASE_URL: http://ollama-app:11434
      WEBUI_SECRET_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      WEBUI_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      CONTAINER_NAME: ollama-ui
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    ports:
      - 172.17.0.1:59042:8080
    volumes:
      - './volumes/data/ui:/app/backend/data'
    depends_on:
      - app
      - comfy
    networks:
      - ollama
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://ollama-ui:8080'
      - 'cloudflare.hostname=ollama.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.ollama-ui.entrypoints=http'
      - 'traefik.http.routers.ollama-ui-secure.tls=true'
      - 'traefik.http.routers.ollama-ui.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.ollama-ui-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.ollama-ui.middlewares=ollama-ui-https-redirect'
      - 'traefik.http.routers.ollama-ui-secure.entrypoints=https'
      - 'traefik.http.routers.ollama-ui-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.ollama-ui-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.ollama-ui-secure.service=ollama-ui'
      - 'traefik.http.services.ollama-ui.loadbalancer.server.port=8080'

  app:
    image: 'ollama/ollama:latest'
    container_name: ollama-app
    hostname: ollama-app
    restart: always
    pull_policy: always
    tty: true
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      OLLAMA_MODELS: /data/models
      CONTAINER_NAME: ollama-app
    expose:
      - 11434
    volumes:
      - './volumes/data/models:/data/models'
      - './volumes/data/ollama:/root/.ollama'
    devices:
      - /dev/dri
    networks:
      - ollama

  comfy:
    image: 'ghcr.io/ai-dock/comfyui:latest'
    container_name: ollama-comfy
    hostname: ollama-comfy
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      COMFYUI_ARGS: --cpu
      WEB_ENABLE_AUTH: "false"
      CF_QUICK_TUNNELS: "false"
      USE_PERSISTENT_DATA: "true"
      DIRECT_ADDRESS_GET_WAN: "true"
      CONTAINER_NAME: ollama-comfy
    expose:
      - 8188
    volumes:
      - './volumes/data/comfy:/workspace'
      - './volumes/data/models:/app/models'
    devices:
      - /dev/dri
    networks:
      - ollama

networks:
  ollama:
    name: ollama
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
